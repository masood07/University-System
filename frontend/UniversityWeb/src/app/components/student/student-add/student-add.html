<div class="container app-section">
    <div class="text-center mb-3">
        <h2 class="section-title mb-1">{{isEditMode ? 'Edit Student' : 'Add New Student'}}</h2>
        <p class="text-muted-2 mb-0">{{isEditMode ? 'Update student information and department.' : 'Fill student information and assign a department.'}}</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">{{isEditMode ? 'Edit Student' : 'Add Student'}}</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" [(ngModel)]="std.name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control" [(ngModel)]="std.age">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" [(ngModel)]="std.address">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Department</label>
                        <select class="form-select" [(ngModel)]="std.deptid">
                            @for (item of depts(); track item.id) {
                                <option [value]="item.id">{{item.name}}</option>
                            }
                        </select>
                    </div>
                    <button class="btn btn-success w-100" (click)="save()">{{isEditMode ? 'Update' : 'Save'}}</button>
                </div>
            </div>
        </div>
    </div>
</div>
