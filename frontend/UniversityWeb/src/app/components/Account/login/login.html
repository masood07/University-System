<section class="container app-section">
	<div class="row justify-content-center align-items-center g-4">
		<div class="col-lg-5 d-none d-lg-block">
			<div class="p-4 rounded-4 bg-white shadow-sm border h-100">
				<span class="badge text-bg-primary mb-3">Welcome Back</span>
				<h2 class="section-title mb-3">University Management Portal</h2>
				<p class="text-muted-2 mb-0">Sign in to access student records, department management, course setup, and academic reports.</p>
			</div>
		</div>

		<div class="col-md-8 col-lg-5">
			<div class="card shadow-sm">
				<div class="card-header bg-primary text-white">Login</div>
				<div class="card-body p-4">
					@if (errorMessage) {
						<div class="alert alert-danger py-2">{{errorMessage}}</div>
					}

					<div class="mb-3">
						<label class="form-label">Username</label>
						<input class="form-control" type="text" [(ngModel)]="user.username" placeholder="Enter your username">
					</div>
					<div class="mb-3">
						<label class="form-label">Password</label>
						<input class="form-control" type="password" [(ngModel)]="user.password" placeholder="Enter your password">
					</div>
					<button class="btn btn-success w-100" (click)="login()">Login to Dashboard</button>

					<div class="text-center mt-3 small">
						<span class="text-muted">Don't have an account?</span>
						<a routerLink="/register" class="ms-1">Register</a>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
