<section class="container app-section">
	<div class="row justify-content-center align-items-center g-4">
		<div class="col-lg-5 d-none d-lg-block">
			<div class="p-4 rounded-4 bg-white shadow-sm border h-100">
				<span class="badge text-bg-warning mb-3">Create Account</span>
				<h2 class="section-title mb-3">Join University Management Portal</h2>
				<p class="text-muted-2 mb-0">Create an account to access secure management tools for students, departments, courses, and academic results.</p>
			</div>
		</div>

		<div class="col-md-8 col-lg-5">
			<div class="card shadow-sm">
				<div class="card-header bg-warning">Register</div>
				<div class="card-body p-4">
					@if (errorMessage) {
						<div class="alert alert-danger py-2">{{errorMessage}}</div>
					}

					<div class="mb-3">
						<label class="form-label">Full Name</label>
						<input class="form-control" type="text" [(ngModel)]="user.fullname" placeholder="Enter full name">
					</div>
					<div class="mb-3">
						<label class="form-label">Age</label>
						<input class="form-control" type="number" [(ngModel)]="user.age" placeholder="Enter age">
					</div>
					<div class="mb-3">
						<label class="form-label">Username</label>
						<input class="form-control" type="text" [(ngModel)]="user.username" placeholder="Choose a username">
					</div>
					<div class="mb-3">
						<label class="form-label">Email</label>
						<input class="form-control" type="email" [(ngModel)]="user.email" placeholder="Enter email">
					</div>
					<div class="mb-3">
						<label class="form-label">Password</label>
						<input class="form-control" type="password" [(ngModel)]="user.password" placeholder="Create password">
					</div>
					<button class="btn btn-success w-100" (click)="save()">Create Account</button>

					<div class="text-center mt-3 small">
						<span class="text-muted">Already have an account?</span>
						<a routerLink="/login" class="ms-1">Login</a>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
