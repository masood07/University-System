
<nav class="navbar navbar-expand-lg navbar-dark app-navbar mb-4">
  <div class="container">
    <a class="navbar-brand" [routerLink]="accSer.isLogged() ? '/home' : '/login'">University System</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      @if (accSer.isLogged()) {
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" routerLink="/home" routerLinkActive="active">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/students" routerLinkActive="active">Students</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/departments" routerLinkActive="active">Departments</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/courses" routerLinkActive="active">Courses</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/results" routerLinkActive="active">Results</a></li>
        </ul>
      } @else {
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" routerLink="/login" routerLinkActive="active">Login</a></li>
          <li class="nav-item"><a class="nav-link" routerLink="/register" routerLinkActive="active">Register</a></li>
        </ul>
      }

      <div class="d-flex gap-2 align-items-center">
        @if (accSer.isLogged()) {
          <span class="text-white small">Hello {{accSer.username()}}</span>
          <button class="btn btn-outline-light btn-sm" type="button" (click)="logout()">Logout</button>
        } @else {
          <a class="btn btn-light btn-sm" routerLink="/login">Login</a>
          <a class="btn btn-warning btn-sm" routerLink="/register">Register</a>
        }
      </div>
    </div>
  </div>
</nav>
